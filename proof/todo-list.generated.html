<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>To-Do List</title>
<style>
  :root {
    --bg: #f4f5f7;
    --card: #ffffff;
    --ink: #1f2933;
    --muted: #7b8794;
    --line: #e4e7eb;
    --accent: #3b82f6;
    --accent-ink: #ffffff;
    --danger: #ef4444;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--ink);
    font: 16px/1.5 system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    justify-content: center;
    padding: 24px 16px 64px;
  }
  .app {
    width: 100%;
    max-width: 540px;
  }
  h1 {
    font-size: 1.6rem;
    margin: 0 0 16px;
    text-align: center;
    letter-spacing: -0.02em;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    box-shadow: 0 1px 3px rgba(15, 23, 42, .06);
    overflow: hidden;
  }
  .input-row {
    display: flex;
    gap: 8px;
    padding: 16px;
    border-bottom: 1px solid var(--line);
  }
  #new-todo {
    flex: 1;
    min-width: 0;
    padding: 11px 12px;
    font-size: 1rem;
    border: 1px solid var(--line);
    border-radius: 9px;
    outline: none;
    background: #fff;
    color: var(--ink);
  }
  #new-todo:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,130,246,.15); }
  button {
    font: inherit;
    cursor: pointer;
    border: 1px solid transparent;
    border-radius: 9px;
    padding: 11px 16px;
    background: #eef1f5;
    color: var(--ink);
    transition: background .12s ease, color .12s ease;
  }
  button:hover { background: #e2e7ee; }
  #add-btn {
    background: var(--accent);
    color: var(--accent-ink);
    font-weight: 600;
    flex: 0 0 auto;
  }
  #add-btn:hover { background: #2f6fe0; }
  .toolbar {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--line);
  }
  .filters { display: flex; gap: 6px; }
  .filters button {
    padding: 7px 12px;
    font-size: .9rem;
    background: transparent;
    border-color: var(--line);
    color: var(--muted);
  }
  .filters button.active {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--accent-ink);
  }
  .spacer { flex: 1; }
  #clear-completed {
    padding: 7px 12px;
    font-size: .9rem;
    background: transparent;
    color: var(--muted);
    border-color: var(--line);
  }
  #clear-completed:hover { color: var(--danger); border-color: var(--danger); }
  #todo-list { list-style: none; margin: 0; padding: 0; }
  .todo-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 13px 16px;
    border-bottom: 1px solid var(--line);
  }
  .todo-item:last-child { border-bottom: none; }
  .todo-toggle {
    width: 20px; height: 20px;
    flex: 0 0 auto;
    cursor: pointer;
    accent-color: var(--accent);
  }
  .todo-text {
    flex: 1;
    min-width: 0;
    word-break: break-word;
  }
  .todo-item[data-completed="true"] .todo-text {
    text-decoration: line-through;
    color: var(--muted);
  }
  .todo-delete {
    flex: 0 0 auto;
    padding: 6px 10px;
    font-size: .85rem;
    background: transparent;
    color: var(--muted);
    border-color: transparent;
    line-height: 1;
  }
  .todo-delete:hover { background: #fdecec; color: var(--danger); }
  .empty {
    padding: 28px 16px;
    text-align: center;
    color: var(--muted);
    font-size: .95rem;
  }
  .statusbar {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    border-top: 1px solid var(--line);
    color: var(--muted);
    font-size: .9rem;
  }
  #active-count { font-weight: 700; color: var(--ink); }
</style>
</head>
<body>
  <main class="app">
    <h1>To-Do List</h1>
    <div class="card">
      <form class="input-row" id="add-form">
        <input type="text" id="new-todo" placeholder="What needs doing?" autocomplete="off" aria-label="New task">
        <button type="submit" id="add-btn">Add</button>
      </form>

      <div class="toolbar">
        <div class="filters">
          <button type="button" id="filter-all">All</button>
          <button type="button" id="filter-active">Active</button>
          <button type="button" id="filter-completed">Completed</button>
        </div>
        <div class="spacer"></div>
        <button type="button" id="clear-completed">Clear completed</button>
      </div>

      <ul id="todo-list"></ul>

      <div class="statusbar">
        <span><span id="active-count" data-value="0">0</span>&nbsp;active task(s) remaining</span>
      </div>
    </div>
  </main>

<script>
(function () {
  "use strict";

  var STORAGE_KEY = "seedlab.todos.v1";
  var todos = [];        // array of { text: string, completed: boolean }
  var filter = "all";    // "all" | "active" | "completed"

  var listEl = document.getElementById("todo-list");
  var inputEl = document.getElementById("new-todo");
  var formEl = document.getElementById("add-form");
  var addBtn = document.getElementById("add-btn");
  var countEl = document.getElementById("active-count");
  var filterButtons = {
    all: document.getElementById("filter-all"),
    active: document.getElementById("filter-active"),
    completed: document.getElementById("filter-completed")
  };

  function load() {
    var raw;
    try { raw = localStorage.getItem(STORAGE_KEY); } catch (e) { raw = null; }
    todos = [];
    if (raw) {
      try {
        var parsed = JSON.parse(raw);
        if (Array.isArray(parsed)) {
          todos = parsed
            .filter(function (t) { return t && typeof t.text === "string"; })
            .map(function (t) { return { text: t.text, completed: t.completed === true }; });
        }
      } catch (e) { todos = []; }
    }
  }

  function save() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(todos)); } catch (e) {}
  }

  function activeCount() {
    var n = 0;
    for (var i = 0; i < todos.length; i++) {
      if (todos[i].completed === false) n++;
    }
    return n;
  }

  function matchesFilter(todo) {
    if (filter === "active") return todo.completed === false;
    if (filter === "completed") return todo.completed === true;
    return true;
  }

  function render() {
    // Rebuild the list from scratch in insertion order.
    listEl.innerHTML = "";

    for (var i = 0; i < todos.length; i++) {
      var todo = todos[i];
      if (!matchesFilter(todo)) continue;

      var item = document.createElement("li");
      item.className = "todo-item";
      item.setAttribute("data-completed", todo.completed ? "true" : "false");
      item.setAttribute("data-index", String(i));

      var toggle = document.createElement("input");
      toggle.type = "checkbox";
      toggle.className = "todo-toggle";
      toggle.checked = todo.completed === true;
      toggle.setAttribute("aria-label", "Toggle task done");

      var text = document.createElement("span");
      text.className = "todo-text";
      text.textContent = todo.text;

      var del = document.createElement("button");
      del.type = "button";
      del.className = "todo-delete";
      del.textContent = "Delete";
      del.setAttribute("aria-label", "Delete task");

      item.appendChild(toggle);
      item.appendChild(text);
      item.appendChild(del);
      listEl.appendChild(item);
    }

    if (listEl.children.length === 0) {
      var empty = document.createElement("li");
      empty.className = "empty";
      empty.textContent = "Nothing here yet.";
      listEl.appendChild(empty);
    }

    // Active count: count of completed === false over the WHOLE list.
    var n = activeCount();
    countEl.setAttribute("data-value", String(n));
    countEl.textContent = String(n);

    // Reflect current filter in the toolbar.
    for (var key in filterButtons) {
      if (filterButtons.hasOwnProperty(key)) {
        if (key === filter) filterButtons[key].classList.add("active");
        else filterButtons[key].classList.remove("active");
      }
    }
  }

  function addTask() {
    var value = inputEl.value.trim();
    if (value === "") return;            // reject empty / whitespace-only
    todos.push({ text: value, completed: false });
    save();
    inputEl.value = "";
    render();
  }

  function setFilter(next) {
    filter = next;
    render();
  }

  function clearCompleted() {
    todos = todos.filter(function (t) { return t.completed !== true; });
    save();
    render();
  }

  // --- Wiring ---

  formEl.addEventListener("submit", function (e) {
    e.preventDefault();
    addTask();
  });

  // Enter in the input also submits via the form; guard in case of no-form contexts.
  inputEl.addEventListener("keydown", function (e) {
    if (e.key === "Enter") {
      e.preventDefault();
      addTask();
    }
  });

  // Event delegation for per-item toggle/delete so re-renders stay cheap.
  listEl.addEventListener("click", function (e) {
    var itemEl = e.target.closest(".todo-item");
    if (!itemEl) return;
    var idx = parseInt(itemEl.getAttribute("data-index"), 10);
    if (isNaN(idx) || idx < 0 || idx >= todos.length) return;

    if (e.target.classList.contains("todo-delete")) {
      todos.splice(idx, 1);
      save();
      render();
    } else if (e.target.classList.contains("todo-toggle")) {
      todos[idx].completed = !todos[idx].completed;
      save();
      render();
    }
  });

  filterButtons.all.addEventListener("click", function () { setFilter("all"); });
  filterButtons.active.addEventListener("click", function () { setFilter("active"); });
  filterButtons.completed.addEventListener("click", function () { setFilter("completed"); });

  document.getElementById("clear-completed").addEventListener("click", clearCompleted);

  // --- Boot ---
  load();
  render();
})();
</script>
</body>
</html>
